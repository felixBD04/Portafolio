<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 360" role="img" aria-label="Attendance AI System preview">
  <defs>
    <linearGradient id="aiBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0A0E1A"/>
      <stop offset="1" stop-color="#0E1530"/>
    </linearGradient>
    <linearGradient id="aiCyan" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00F0FF"/>
      <stop offset="1" stop-color="#00B8FF"/>
    </linearGradient>
    <linearGradient id="aiMagenta" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#B026FF"/>
      <stop offset="1" stop-color="#8A1FCB"/>
