    <rect x="10" y="68" width="80" height="3" rx="1" fill="#3A4A6E"/>
    <rect x="10" y="78" width="65" height="3" rx="1" fill="#3A4A6E"/>
    <rect x="10" y="88" width="75" height="3" rx="1" fill="#3A4A6E"/>
    <rect x="10" y="102" width="40" height="3" rx="1" fill="#3A4A6E"/>
