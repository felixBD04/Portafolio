    <path d="M 14 30 L 19 35 L 27 25" stroke="#5DCAA5" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="40" y="26" fill="#5DCAA5" font-family="JetBrains Mono, monospace" font-size="9" font-weight="700">APPROVED</text>
    <text x="40" y="40" fill="#7A8AAE" font-family="JetBrains Mono, monospace" font-size="7">Sheet · Drive</text>
