    <radialGradient id="aiBrainGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#B026FF" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#B026FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="aiBlur"><feGaussianBlur stdDeviation="2"/></filter>
    <pattern id="aiGrid" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#00F0FF" stroke-width="0.3" opacity="0.18"/>
    </pattern>
  </defs>

  <rect width="560" height="360" fill="url(#aiBg)"/>
