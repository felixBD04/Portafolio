    <text x="30" y="20" fill="#FFF" font-family="JetBrains Mono, monospace" font-size="10">workflow.n8n</text>
    <text x="160" y="20" fill="#7A8AAE" font-family="JetBrains Mono, monospace" font-size="9">·</text>
    <text x="170" y="20" fill="#7A8AAE" font-family="JetBrains Mono, monospace" font-size="9">attendance-ai-system</text>
    <text x="395" y="20" fill="#5DCAA5" font-family="JetBrains Mono, monospace" font-size="9" font-weight="700">● LIVE</text>
