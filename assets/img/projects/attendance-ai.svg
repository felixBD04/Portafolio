      <line x1="20" y1="-15" x2="0" y2="0"/>
      <line x1="-15" y1="15" x2="0" y2="0"/>
      <line x1="18" y1="12" x2="0" y2="0"/>
      <line x1="-25" y1="5" x2="-15" y2="15"/>
      <line x1="25" y1="-2" x2="20" y2="-15"/>
      <line x1="-20" y1="-10" x2="-25" y2="5"/>
